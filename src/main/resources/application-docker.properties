server.port=8081
server.servlet.context-path=/event-service

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:eventdb}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USER:eventmaster}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# ddl-auto=update lets Hibernate create/evolve the schema from JPA annotations.
# schema.sql is skipped automatically for non-embedded databases.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable H2 console — not available with PostgreSQL
spring.h2.console.enabled=false

# Jackson — serialize LocalDateTime as ISO-8601 strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# User-service base URL (Docker internal hostname)
user.service.base-url=http://user-service:8080/user-service

# Logging
logging.level.root=INFO
logging.level.com.eventmaster=INFO
logging.file.name=logs/event-service.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
