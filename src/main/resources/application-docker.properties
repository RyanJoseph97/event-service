server.port=8081
server.servlet.context-path=/event-service

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:eventdb}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USER:eventmaster}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Flyway owns the schema (V1 baseline + V2 full-text index); Hibernate only validates that
# the entity model matches it. Drift between entities and migrations fails startup loudly.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway: migrate before Hibernate validates. baseline-on-migrate lets an existing
# pre-Flyway database (a dev volume created under the old ddl-auto=update) adopt the
# baseline cleanly; a fresh RDS instance just runs V1+V2 from empty.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Disable H2 console — not available with PostgreSQL
spring.h2.console.enabled=false

# Jackson — serialize LocalDateTime as ISO-8601 strings, not arrays
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT — must be provided via environment (Secrets Manager in prod); fail fast if missing.
jwt.secret=${JWT_SECRET:?JWT_SECRET must be set}
jwt.expiration=86400000

# User-service base URL (Docker internal hostname)
user.service.base-url=http://user-service:8080/user-service

# Enable PostgreSQL GIN-backed full-text search
app.search.fts.enabled=true

# Logging
logging.level.root=INFO
logging.level.com.eventmaster=INFO
logging.file.name=logs/event-service.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# Distributed Tracing
spring.zipkin.enabled=true
spring.zipkin.base-url=${SPRING_ZIPKIN_BASE_URL:http://zipkin:9411}
spring.sleuth.sampler.probability=1.0
