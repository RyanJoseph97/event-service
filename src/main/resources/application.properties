server.port=8081
# Context path namespaces this service under /event-service (intentional).
# All clients and API gateway routes must include this prefix.
server.servlet.context-path=/event-service

# Database Configuration
spring.datasource.url=jdbc:h2:mem:eventdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
# Must match jwt.secret in user-service. Override with JWT_SECRET env var in production.
jwt.secret=${JWT_SECRET:eventmaster-shared-dev-secret-key-change-in-prod}
jwt.expiration=86400000

# User-service base URL for verification checks
user.service.base-url=http://localhost:8080/user-service

# Logging Configuration
logging.level.root=INFO
logging.level.com.eventmaster=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.file.name=logs/event-service.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
